apiVersion: apps/v1
kind: Deployment
metadata:
  name: sso-service
  namespace: token-launchpad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sso-service
  template:
    metadata:
      labels:
        app: sso-service
    spec:
      containers:
        - name: sso-service
          image: token-launchpad/sso-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/launchpad_sso
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: launchpad-secrets
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: launchpad-secrets
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: launchpad-secrets
                  key: JWT_SECRET_KEY
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: sso-service
  namespace: token-launchpad
spec:
  type: ClusterIP
  selector:
    app: sso-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
