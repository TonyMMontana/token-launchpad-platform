apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: token-launchpad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transaction-service
  template:
    metadata:
      labels:
        app: transaction-service
    spec:
      containers:
        - name: transaction-service
          image: token-launchpad/transaction-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8083
              name: http
          env:
            - name: DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/launchpad_transaction
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: launchpad-secrets
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: launchpad-secrets
                  key: POSTGRES_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: launchpad-config
                  key: REDIS_HOST
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: launchpad-config
                  key: RABBITMQ_HOST
            - name: SPRING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: launchpad-secrets
                  key: RABBITMQ_USERNAME
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: launchpad-secrets
                  key: RABBITMQ_PASSWORD
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-service
  namespace: token-launchpad
spec:
  type: ClusterIP
  selector:
    app: transaction-service
  ports:
    - name: http
      port: 8083
      targetPort: 8083
