spring:
  application:
    name: campaign-service-test

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migrations

  rabbitmq:
    listener:
      simple:
        missing-queues-fatal: false

outbox:
  publisher:
    enabled: false

logging:
  level:
    root: INFO
    com.campaignservice: DEBUG
    org.springframework.test.context.transaction: INFO
    org.testcontainers: INFO
