server:
  port: 8082

spring:
  application:
    name: campaign-service
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: ${DATASOURCE_URL}
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka